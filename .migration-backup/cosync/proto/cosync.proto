syntax = "proto3";

package cosync;

message Envelope {
  bytes sender_device_id = 1;
  bytes hlc_timestamp = 2;
  oneof payload {
    Heartbeat heartbeat = 10;
    PairingRequest pairing_request = 11;
    PairingAck pairing_ack = 12;
    ClipboardUpdate clipboard_update = 20;
    FileMeta file_meta = 30;
    FileChunk file_chunk = 31;
    FileAck file_ack = 32;
    NotificationEvent notification_event = 40;
    NotificationReply notification_reply = 41;
  }
}

message Heartbeat {
  uint64 seq = 1;
}

message PairingRequest {
  string device_name = 1;
  string public_key_fingerprint = 2;
  uint32 port = 3;
  bytes pairing_token = 4;
}

message PairingAck {
  bool accepted = 1;
  string reason = 2;
  string device_name = 3;
  string public_key_fingerprint = 4;
}

message ClipboardUpdate {
  bytes content = 1;
  string content_type = 2;
}

message FileMeta {
  string file_name = 1;
  uint64 file_size = 2;
  string sha256 = 3;
  string content_type = 4;
  uint32 total_chunks = 5;
  string transfer_id = 6;
}

message FileChunk {
  string transfer_id = 1;
  uint32 chunk_index = 2;
  bytes data = 3;
}

message FileAck {
  string transfer_id = 1;
  bool success = 2;
  string error = 3;
}

message NotificationEvent {
  string package_name = 1;
  string title = 2;
  string text = 3;
  map<string, string> extras = 4;
  int64 posted_at_ms = 5;
}

message NotificationReply {
  string notification_key = 1;
  string reply_text = 2;
}