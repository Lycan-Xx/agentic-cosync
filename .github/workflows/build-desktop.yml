name: Build Desktop

# ── Triggers ─────────────────────────────────────────────────────────────────
# Runs on every pull request and on manual dispatch.
# NOT triggered by a plain push — uncomment the push block below if you want that.
on:
  pull_request:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 0.1.0) — informational only"
        required: false
        default: "0.1.0"

# Only one build per ref at a time; cancel any in-progress run on a new push.
concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

# ── Jobs ─────────────────────────────────────────────────────────────────────

jobs:
  # ── Windows ─────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows — NSIS installer (.exe)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install JS dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build (Windows NSIS)
        working-directory: apps/desktop
        run: npm run tauri build -- --bundles nsis

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: cosync-windows-${{ github.sha }}
          path: target/release/bundle/nsis/*.exe
          retention-days: 30


