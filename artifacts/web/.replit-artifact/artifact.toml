kind = "web"
previewPath = "/"
title = "Cosync"
version = "1.0.0"
id = "artifacts/cosync"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25788

[services.development]
run = "pnpm --filter @workspace/cosync run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cosync", "run", "build" ]
serve = "static"
publicDir = "artifacts/web/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25788"
BASE_PATH = "/"
